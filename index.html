<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>내장형 VOCA 시험지 생성기</title>
<style>
    body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #eef2f5; margin: 0; padding: 0; color: #222; }
    
    /* 앱 컨트롤러 화면 */
    .app-container { max-width: 600px; margin: 50px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); text-align: center; }
    .app-container h1 { color: #2c3e50; margin-top: 0; margin-bottom: 10px; font-size: 28px; }
    .app-container p { color: #666; margin-bottom: 30px; }
    
    .setting-box { background: #f8f9fa; padding: 25px; border-radius: 8px; display: flex; flex-direction: column; gap: 20px; align-items: center; margin-bottom: 30px; }
    .setting-row { display: flex; align-items: center; gap: 15px; font-size: 18px; font-weight: bold; }
    .setting-row input[type="number"] { width: 80px; padding: 10px; text-align: center; border: 2px solid #cbd5e1; border-radius: 6px; font-size: 18px; font-weight: bold; color: #333; }
    .setting-row input[type="checkbox"] { transform: scale(1.4); cursor: pointer; }
    
    button.btn-generate { background: #3b82f6; color: white; border: none; padding: 16px 40px; font-size: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px rgba(59, 130, 246, 0.2); transition: 0.2s; }
    button.btn-generate:hover { background: #2563eb; transform: translateY(-2px); }
    
    /* 화면용 뒤로가기 버튼 */
    .btn-back { display: none; margin: 20px auto; padding: 10px 20px; background: #64748b; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
    .btn-back:hover { background: #475569; }

    /* 인쇄될 페이지 스타일 (A4 규격) */
    .print-area { display: none; }
    .page { background: white; width: 210mm; min-height: 297mm; margin: 0 auto; padding: 15mm 20mm; box-sizing: border-box; position: relative; }
    .page-break { page-break-after: always; }
    
    /* 시험지 헤더 */
    .test-title { text-align: center; font-size: 26px; font-weight: bold; margin-bottom: 20px; letter-spacing: 1px; border-bottom: 2px solid #000; padding-bottom: 15px; }
    .student-info { text-align: right; font-size: 15px; font-weight: bold; margin-bottom: 30px; }
    .student-info span { display: inline-block; width: 120px; border-bottom: 1px solid #000; margin-left: 10px; text-align: center; }

    /* 시험지 본문 (2단 레이아웃) */
    .exam-grid { display: grid; grid-template-columns: 1fr 1fr; column-gap: 40px; row-gap: 12px; font-size: 15px; }
    .exam-item { display: flex; align-items: flex-end; border-bottom: 1px dotted #aaa; padding-bottom: 4px; }
    .exam-num { width: 35px; font-weight: bold; color: #555; text-align: right; padding-right: 10px; }
    .exam-word { width: 150px; font-weight: bold; font-family: 'Times New Roman', Times, serif; font-size: 17px; }
    .exam-blank { flex-grow: 1; min-height: 20px; }

    /* 답안지 테이블 */
    .ans-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
    .ans-table th, .ans-table td { border: 1px solid #777; padding: 6px 8px; text-align: left; }
    .ans-table th { background: #f0f0f0; text-align: center; }

    @media print {
        body { background: white; margin: 0; }
        .app-container, .btn-back { display: none !important; }
        .print-area { display: block !important; }
        .page { width: 100%; height: auto; margin: 0; padding: 10mm; box-shadow: none; }
    }
</style>
</head>
<body>

<div class="app-container" id="appScreen">
    <h1>📖 VOCA 단어 시험지 출력기</h1>
    <p>데이터가 내장되어 있습니다. 인쇄할 Day만 선택하세요.</p>
    
    <div class="setting-box">
        <div class="setting-row">
            <label for="targetDay">출제할 Day :</label>
            <input type="number" id="targetDay" value="1" min="1" max="30">
        </div>
        <div class="setting-row" style="font-size: 16px; color: #555;">
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                <input type="checkbox" id="randomize">
                단어 순서 무작위로 섞기
            </label>
        </div>
    </div>
    
    <button class="btn-generate" onclick="generateTest()">🖨️ 시험지 만들기 (PDF 저장)</button>
</div>

<button class="btn-back" id="btnBack" onclick="goBack()">🔙 다시 설정하기</button>
<div id="printArea" class="print-area"></div>

<script>
    // CSV 파싱 함수
    function parseCSVLine(text) {
        let arr = [];
        let quote = false;
        let col = '';
        for (let i = 0; i < text.length; i++) {
            let c = text[i];
            if (c === '"') { quote = !quote; continue; }
            if (c === ',' && !quote) { arr.push(col.trim()); col = ''; continue; }
            col += c;
        }
        arr.push(col.trim());
        return arr;
    }

    // 배열 섞기 함수
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function generateTest() {
        // 숨겨둔 script 태그 안에서 텍스트(데이터)를 가져옵니다.
        const rawData = document.getElementById('vocaDatabase').textContent.trim();
        const targetDay = parseInt(document.getElementById('targetDay').value);
        const randomize = document.getElementById('randomize').checked;

        const lines = rawData.split('\n');
        let dayWords = [];

        // 데이터 추출 (입력된 Day에 해당하는 단어만 수집)
        for(let i = 1; i < lines.length; i++) {
            const line = lines[i].trim();
            if(!line) continue;
            
            const cols = parseCSVLine(line);
            if(cols.length < 3) continue;

            const day = parseInt(cols[0]);
            if(day === targetDay) {
                dayWords.push({
                    originalNum: cols[1],
                    word: cols[2],
                    mean: cols.slice(3).join(', ')
                });
            }
        }

        if(dayWords.length === 0) { 
            alert(`선택하신 Day ${targetDay} 에 해당하는 단어가 없습니다.\n(하단 데이터 내장 영역에 올바르게 붙여넣었는지 확인해주세요.)`); 
            return; 
        }

        // 옵션에 따라 배열 섞기
        if (randomize) {
            shuffle(dayWords);
        }

        const printArea = document.getElementById('printArea');
        let htmlStr = '';

        // ======== 1페이지: 문제지 ========
        htmlStr += `<div class="page page-break">
            <div class="test-title">VOCA 단어 테스트 (Day ${targetDay})</div>
            <div class="student-info">
                이름: <span></span> 점수: <span style="width: 80px;"></span> / ${dayWords.length}
            </div>
            <div class="exam-grid">`;

        dayWords.forEach((item, idx) => {
            htmlStr += `
                <div class="exam-item">
                    <div class="exam-num">${idx + 1}.</div>
                    <div class="exam-word">${item.word}</div>
                    <div class="exam-blank"></div>
                </div>`;
        });

        htmlStr += `</div></div>`;

        // ======== 2페이지: 정답지 ========
        htmlStr += `<div class="page">
            <div class="test-title" style="border-bottom:none; margin-bottom:10px;">Day ${targetDay} 정답지</div>
            <table class="ans-table">
                <thead>
                    <tr>
                        <th style="width: 8%;">출제 번호</th>
                        <th style="width: 10%;">원래 번호</th>
                        <th style="width: 32%;">단어</th>
                        <th style="width: 50%;">뜻</th>
                    </tr>
                </thead>
                <tbody>`;

        dayWords.forEach((item, idx) => {
            htmlStr += `
                <tr>
                    <td style="text-align: center;"><b>${idx + 1}</b></td>
                    <td style="text-align: center; color: #666;">${item.originalNum}번</td>
                    <td><b>${item.word}</b></td>
                    <td>${item.mean}</td>
                </tr>`;
        });

        htmlStr += `</tbody></table></div>`;

        // 화면 전환
        document.getElementById('appScreen').style.display = 'none';
        printArea.innerHTML = htmlStr;
        printArea.style.display = 'block';
        document.getElementById('btnBack').style.display = 'block';
        
        // 인쇄 다이얼로그 호출
        setTimeout(() => { window.print(); }, 300);
    }

    // 뒤로가기 (앱 화면으로 복귀)
    function goBack() {
        document.getElementById('printArea').style.display = 'none';
        document.getElementById('btnBack').style.display = 'none';
        document.getElementById('appScreen').style.display = 'block';
    }
</script>

</body>
</html>
